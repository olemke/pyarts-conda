python:
  - 3.10
  - 3.11
  - 3.12
  - 3.13
  - 3.14

c_stdlib:
  - if: linux
    then: sysroot
  - if: osx
    then: macosx_deployment_target

c_compiler:
  - if: osx
    then: clang
  - if: win
    then: vs2026

c_compiler_version:
  - if: linux
    then: 15
  - if: osx
    then: 21
  - if: win
    then: 19.51

cxx_compiler:
  - if: osx
    then: clangxx
  - if: win
    then: vs2026

cxx_compiler_version:
  - if: linux
    then: 15
  - if: osx
    then: 21
  - if: win
    then: 19.51

c_stdlib_version:
  - if: linux
    then: "2.17"
  - if: osx
    then: "11.0"
